version: "3.8"

services:
  # ── VC-LMS Application ─────────────────────────────────────
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://vclms:vclms_password@postgres:5432/vclms
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-change-me-webhook}
      - CAS_STORAGE_PATH=/app/cas_storage
      - DEBUG=false
    volumes:
      - cas_data:/app/cas_storage
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL Database ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vclms
      POSTGRES_PASSWORD: vclms_password
      POSTGRES_DB: vclms
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vclms"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO (S3-Compatible Object Store) — Optional ──────────
  # Uncomment to use MinIO instead of local filesystem for CAS
  # minio:
  #   image: minio/minio:latest
  #   command: server /data --console-address ":9001"
  #   environment:
  #     MINIO_ROOT_USER: minioadmin
  #     MINIO_ROOT_PASSWORD: minioadmin
  #   volumes:
  #     - minio_data:/data
  #   ports:
  #     - "9000:9000"
  #     - "9001:9001"
  #   restart: unless-stopped

volumes:
  pg_data:
  cas_data:
  # minio_data:
